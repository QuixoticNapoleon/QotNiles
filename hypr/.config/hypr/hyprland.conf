#
# 📎 Translated from bspwm + sxhkd configuration


# ╔════════════════════════════════════════╗
# ║  🖥  MONITORS                          ║
# ╚════════════════════════════════════════╝

monitor=,preferred,auto,auto


# ╔════════════════════════════════════════╗
# ║  📦  MY PROGRAMS                       ║
# ╚════════════════════════════════════════╝

$terminal = kitty
$fileManager = dolphin
$menu = rofi -modi drun -show drun -config ~/.config/rofi/rofidmenu.rasi
$browser = firefox


# ╔════════════════════════════════════════╗
# ║  ⚡  AUTOSTART                         ║
# ╚════════════════════════════════════════╝

exec-once = kitty
exec-once = kitty
exec-once = quickshell
exec-once = hyprpaper
exec-once = dunst
exec-once = wl-paste --watch cliphist store

# ╔════════════════════════════════════════╗
# ║  🌿  ENVIRONMENT VARIABLES             ║
# ╚════════════════════════════════════════╝

env = XCURSOR_THEME,Vimix-cursors
env = XCURSOR_SIZE,24
env = HYPRCURSOR_THEME,Vimix-cursors
env = HYPRCURSOR_SIZE,24


# ╔════════════════════════════════════════╗
# ║  ⌨  DEVICE                            ║
# ╚════════════════════════════════════════╝
device {
    name = at-translated-set-2-keyboard
    enabled = false
}


# ╔════════════════════════════════════════╗
# ║  🎨  LOOK AND FEEL                     ║
# ╚════════════════════════════════════════╝

# 🎨 Colors (ported from bspwm)
$darkcyan = rgb(007575)
$lightcyan = rgb(1ebaba)
$lightercyan = rgb(19e0e0)
$red = rgb(e55235)

general {
    gaps_in = 3
    gaps_out = 3

    border_size = 1

    col.active_border = $lightercyan
    col.inactive_border = $darkcyan

    resize_on_border = false
    allow_tearing = false
    layout = scrolling
}

dwindle {
	preserve_split = true
	force_split = 2
    pseudotile = true
    preserve_split = true
}

decoration {
    rounding = 0

    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 0
        passes = 5

        ignore_opacity = false
        new_optimizations = true
        xray = false
        vibrancy = 0.1696
    }
}

animations {
    enabled = true

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 4, default, slidefade
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}


# ╔════════════════════════════════════════╗
# ║  🖱  INPUT                             ║
# ╚════════════════════════════════════════╝

input {
	# kb_layout = us,us,cn,jp,ru
    # kb_variant = dvorak,,wubi,,,
    # kb_model =
    # kb_options = grp:ctrl_shift_toggle
    # kb_rules =
	kb_layout = us
	kb_variant = dvps
	kb_options = caps:backspace

    follow_mouse = 1

    sensitivity = 0

    touchpad {
        natural_scroll = false
    }
}

gestures {
    # workspace_swipe option does not exist in current Hyprland
}

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


# ╔════════════════════════════════════════╗
# ║  ⌨  KEYBINDINGS                       ║
# ╚════════════════════════════════════════╝

$mainMod = SUPER

# 🚀 Applications
bind = $mainMod, Return, exec, $terminal
bind = $mainMod ALT, Return, exec, kitty --class floating
bind = $mainMod, W, exec, $browser
bind = $mainMod, D, exec, $menu
bind = $mainMod, E, exec, emacs

# 📜 Scripts
bind = $mainMod, V, exec, ~/.config/rofi/scripts/clipboard-wayland.sh
bind = $mainMod, S, exec, ~/.config/hypr/scripts/screenshot
bind = $mainMod SHIFT, S, exec, ~/.config/hypr/scripts/screenshot snip
bind = $mainMod, slash, exec, ~/Scripts/blur-lock

# 🪟 Window Management
bind = $mainMod SHIFT, C, killactive,
bind = $mainMod SHIFT, R, exec, hyprctl reload
bind = $mainMod, F, fullscreen, 0
bind = $mainMod, M, fullscreen, 1

# 👁  Move Focus (Vim-style)
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# ↔  Move Window (Vim-style)
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

# ✂  Preselection / Split Direction (Ctrl+Super+hjkl)
bind = $mainMod CTRL, H, layoutmsg, preselect l
bind = $mainMod CTRL, L, layoutmsg, preselect r
bind = $mainMod CTRL, K, layoutmsg, preselect u
bind = $mainMod CTRL, J, layoutmsg, preselect d

# 🔄 Swap with last window
bind = $mainMod CTRL, M, swapnext, prev

# 🔢 Switch Workspaces (Dvorak layout keys)
# Note: These keybinds match Dvorak layout from sxhkd config
bind = $mainMod, ampersand, workspace, 1      # 一
bind = $mainMod, bracketleft, workspace, 2    # 二
bind = $mainMod, braceleft, workspace, 3      # 三
bind = $mainMod, braceright, workspace, 4     # 四
bind = $mainMod, parenleft, workspace, 5      # 五
bind = $mainMod, equal, workspace, 6          # 六
bind = $mainMod, asterisk, workspace, 7       # 七
bind = $mainMod, parenright, workspace, 8     # 八
bind = $mainMod, plus, workspace, 9           # 九
bind = $mainMod, bracketright, workspace, 10  # 十
bind = $mainMod, exclam, workspace, 11        # 󱉼

# 📦 Move to Workspace (Dvorak layout keys)
bind = $mainMod SHIFT, ampersand, movetoworkspace, 1
bind = $mainMod SHIFT, bracketleft, movetoworkspace, 2
bind = $mainMod SHIFT, braceleft, movetoworkspace, 3
bind = $mainMod SHIFT, braceright, movetoworkspace, 4
bind = $mainMod SHIFT, parenleft, movetoworkspace, 5
bind = $mainMod SHIFT, equal, movetoworkspace, 6
bind = $mainMod SHIFT, asterisk, movetoworkspace, 7
bind = $mainMod SHIFT, parenright, movetoworkspace, 8
bind = $mainMod SHIFT, plus, movetoworkspace, 9
bind = $mainMod SHIFT, bracketright, movetoworkspace, 10
bind = $mainMod SHIFT, exclam, movetoworkspace, 11

# 🖱  Scroll Through Workspaces (mainMod + scroll)
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# 🖱  Move / Resize Windows (mainMod + LMB/RMB)
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# 🎵 Media Keys
bindel = , XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5% && VOLUME=$(pactl get-sink-volume @DEFAULT_SINK@ | grep -Po '\d+%' | head -1) && dunstify " Volume: $VOLUME" -h int:value:"${VOLUME%\%}" -r 2593 -t 1000
bindel = , XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5% && VOLUME=$(pactl get-sink-volume @DEFAULT_SINK@ | grep -Po '\d+%' | head -1) && dunstify " Volume: $VOLUME" -h int:value:"${VOLUME%\%}" -r 2593 -t 1000
bindl = , XF86AudioMute, exec, ~/.config/hypr/scripts/mute


# ╔════════════════════════════════════════╗
# ║  🪟  LAYER RULES                       ║
# ╚════════════════════════════════════════╝

layerrule = blur on, match:namespace rofi
layerrule = ignore_alpha 0.5, match:namespace rofi
layerrule = blur on, match:namespace quickshell*
layerrule = ignore_alpha 0.5, match:namespace quickshell*


# ╔════════════════════════════════════════╗
# ║  🗂  WINDOWS AND WORKSPACES            ║
# ╚════════════════════════════════════════╝

# 🦊 Firefox → workspace 2
windowrule = match:class ^(firefox)$, workspace 2

# 📝 Emacs → workspace 3
windowrule = match:class ^(Emacs)$, workspace 3

# 🎈 Float windows with class "floating"
windowrule = match:class ^(floating)$, float on

# 💻 Dropdown terminal (yakuake-style)
windowrule = match:class ^(quickshell-dropdown)$, float on
windowrule = match:class ^(quickshell-dropdown)$, size 100% 40%
windowrule = match:class ^(quickshell-dropdown)$, move 0 25

# 🗂  Workspace Names (Chinese characters from bspwm)
exec-once = hyprctl dispatch renameworkspace "1 一"
exec-once = hyprctl dispatch renameworkspace "2 二"
exec-once = hyprctl dispatch renameworkspace "3 三"
exec-once = hyprctl dispatch renameworkspace "4 四"
exec-once = hyprctl dispatch renameworkspace "5 五"
exec-once = hyprctl dispatch renameworkspace "6 六"
exec-once = hyprctl dispatch renameworkspace "7 七"
exec-once = hyprctl dispatch renameworkspace "8 八"
exec-once = hyprctl dispatch renameworkspace "9 九"
exec-once = hyprctl dispatch renameworkspace "10 十"
exec-once = hyprctl dispatch renameworkspace "11 󱉼"
